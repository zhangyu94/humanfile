name: Release Core

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-core-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    uses: sxzz/workflows/.github/workflows/release.yml@v1
    with:
      publish: true
      build: pnpm build && pnpm test
    permissions:
      contents: write
      id-token: write
