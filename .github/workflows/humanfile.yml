name: Humanfile Guard

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: humanfile-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  guard:
    name: Validate .human boundaries
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts
      - name: Build local action and core package
        run: pnpm build

      # This runs the local GitHub Action implementation in log-only mode,
      # and fails the workflow if readonly-protected files were changed.
      - name: Evaluate protected-file changes
        uses: ./packages/action
        with:
          comment-on-pr: false
          fail-on-readonly: true
